# Example docker-compose for nocodb-mcp HTTP transport.
# Drop this in any directory, fill in env vars, and run:
#
#   docker compose up -d
#
# Then point any MCP HTTP client at http://localhost:3000/mcp
# Health check: http://localhost:3000/health

services:
  nocodb-mcp:
    image: ghcr.io/zoyak-tech/nocodb-mcp:latest
    # Or build from source:
    # build: .
    container_name: nocodb-mcp
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Required:
      NOCODB_BASE_URL: 'https://your-nocodb.com'
      NOCODB_API_TOKEN: '${NOCODB_API_TOKEN}'  # set via .env or shell
      # Optional:
      NOCODB_DEFAULT_BASE_ID: ''
      NOCODB_TIMEOUT_MS: '30000'
      NOCODB_LOG_LEVEL: 'info'
      MCP_STATELESS: 'false'
    healthcheck:
      test: ['CMD', 'node', '-e', 'fetch(`http://127.0.0.1:${process.env.PORT||3000}/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
