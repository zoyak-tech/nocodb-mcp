# Smithery deployment configuration
# https://smithery.ai/docs/deployments

startCommand:
  type: stdio
  command: node
  args:
    - dist/index-stdio.js
  configSchema:
    type: object
    required:
      - nocodbBaseUrl
      - nocodbApiToken
    properties:
      nocodbBaseUrl:
        type: string
        title: NocoDB Base URL
        description: Your NocoDB instance URL (e.g. https://data.example.com). No trailing slash.
        examples:
          - https://app.nocodb.com
          - https://nocodb.your-domain.com
      nocodbApiToken:
        type: string
        title: NocoDB API Token
        description: Personal access token from NocoDB → Account Settings → Tokens. Format starts with `nc_pat_`.
        format: password
      nocodbDefaultBaseId:
        type: string
        title: Default Base ID (optional)
        description: If set, tools that accept a base_id will fall back to this when not provided.
      nocodbTimeoutMs:
        type: integer
        title: Request Timeout (ms)
        description: HTTP timeout for NocoDB API calls. Default 30000.
        default: 30000
        minimum: 1000
      nocodbLogLevel:
        type: string
        title: Log Level
        enum:
          - debug
          - info
          - warn
          - error
        default: info
  env:
    NOCODB_BASE_URL: '{{nocodbBaseUrl}}'
    NOCODB_API_TOKEN: '{{nocodbApiToken}}'
    NOCODB_DEFAULT_BASE_ID: '{{nocodbDefaultBaseId}}'
    NOCODB_TIMEOUT_MS: '{{nocodbTimeoutMs}}'
    NOCODB_LOG_LEVEL: '{{nocodbLogLevel}}'

build:
  dockerfile: Dockerfile

metadata:
  description: |
    Full-coverage MCP server for NocoDB v3 — including everything other MCPs miss:
    field creation, view management, webhooks, schema export/import, CSV import,
    relational links, dashboards, NocoDocs, scripts, and more.
  homepage: https://github.com/zoyak-tech/nocodb-mcp
  repository: https://github.com/zoyak-tech/nocodb-mcp
  license: MIT
  tags:
    - nocodb
    - database
    - no-code
    - airtable-alternative
    - schema-management
